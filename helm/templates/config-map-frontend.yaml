apiVersion: v1
kind: ConfigMap
metadata:
  name: config-map-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    app: config-map-frontend
data:
  default.conf: |
    map $http_authorization $valid_key {
      include /etc/config/secret/*.conf;
      default unauthenticated;
    }
    server {
      listen 80 default_server;
      location / {
        if ($valid_key != pass) {
          return 401;
        }
        proxy_pass http://service-ollama:11434;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Needs to be set to the same value as in the ingress-webapp.yaml file.
        proxy_read_timeout 300s;
        # CRITICAL: Disable buffering for SSE streaming to prevent markdown corruption. When
        # buffering is ON, nginx re-chunks the stream arbitrarily, breaking markdown tokens
        # across chunk boundaries. See:
        # https://github.com/open-webui/open-webui/discussions/20588#discussioncomment-15469248
        proxy_buffering off;
        proxy_cache off;
      }
    }
